<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Unfolding Origami Instagram Preorder Story</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --cream: #FBF7F0;
      --warm-white: #FFFDF9;
      --sage: #4A5C5A;
      --muted-sage: #7D8C88;
      --clay: #B98F76;
      --soft-clay: #E6D1C3;
      --ink: #2F3A38;
      --mist: #EDE8E1;
      --border: #D8CEC2;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--mist);
      color: var(--ink);
      font-family: "Inter", Arial, sans-serif;
    }

    .canvas {
      position: relative;
      width: 1080px;
      height: 1920px;
      overflow: hidden;
      background:
        linear-gradient(139deg, transparent 0 42%, rgba(216, 206, 194, 0.46) 42.1%, transparent 42.35%),
        linear-gradient(38deg, transparent 0 67%, rgba(230, 209, 195, 0.44) 67.1%, transparent 67.45%),
        var(--cream);
      padding: 96px;
    }

    .canvas::before {
      content: "";
      position: absolute;
      inset: 62px;
      border: 1px solid rgba(216, 206, 194, 0.7);
      pointer-events: none;
    }

    .canvas::after {
      content: "";
      position: absolute;
      bottom: 0;
      left: 0;
      width: 300px;
      height: 300px;
      background: linear-gradient(315deg, var(--soft-clay) 0 50%, rgba(255, 253, 249, 0.65) 50.4% 100%);
      border-top: 1px solid var(--border);
      border-right: 1px solid var(--border);
      pointer-events: none;
    }

    .content {
      position: relative;
      z-index: 1;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      background: rgba(255, 253, 249, 0.68);
      border: 1px solid var(--border);
      padding: 90px 76px;
    }

    .label {
      width: fit-content;
      color: var(--clay);
      font-size: 32px;
      font-weight: 700;
      letter-spacing: 0.17em;
      text-transform: uppercase;
    }

    h1 {
      max-width: 760px;
      margin: 86px 0 0;
      color: var(--sage);
      font-family: "Playfair Display", Georgia, serif;
      font-size: 112px;
      line-height: 0.98;
      letter-spacing: 0;
    }

    .author {
      margin-top: 30px;
      color: var(--muted-sage);
      font-size: 32px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .description {
      max-width: 790px;
      margin: 0;
      color: var(--ink);
      font-size: 43px;
      line-height: 1.31;
    }

    .detail {
      margin-top: 42px;
      padding-top: 34px;
      border-top: 1px solid var(--border);
      color: var(--sage);
      font-size: 36px;
      font-weight: 700;
      line-height: 1.24;
    }

    .url {
      color: var(--sage);
      font-size: 34px;
      font-weight: 800;
      letter-spacing: 0.05em;
    }

    [contenteditable="true"]:focus {
      outline: 3px solid rgba(185, 143, 118, 0.42);
      outline-offset: 6px;
    }
  </style>
</head>
<body>
  <main class="canvas" aria-label="Instagram story preorder graphic">
    <section class="content">
      <div>
        <div class="label" contenteditable="true">PREORDERS ARE OPEN</div>
        <h1 contenteditable="true">Unfolding Origami: A Memoir</h1>
        <div class="author" contenteditable="true">Loren Galese</div>
      </div>
      <div>
        <p class="description" contenteditable="true">A trauma therapist's memoir about folding back to yourself after trauma.</p>
        <div class="detail" contenteditable="true">Signed copies include a surprise from Loren.</div>
      </div>
      <div class="url" contenteditable="true">wovenself.com/author</div>
    </section>
  </main>
</body>
</html>
