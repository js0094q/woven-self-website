<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Unfolding Origami Instagram Community Post</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --cream: #FBF7F0;
      --warm-white: #FFFDF9;
      --sage: #4A5C5A;
      --muted-sage: #7D8C88;
      --clay: #B98F76;
      --soft-clay: #E6D1C3;
      --ink: #2F3A38;
      --mist: #EDE8E1;
      --border: #D8CEC2;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--mist);
      color: var(--ink);
      font-family: "Inter", Arial, sans-serif;
    }

    .canvas {
      position: relative;
      width: 1080px;
      height: 1080px;
      overflow: hidden;
      background:
        linear-gradient(150deg, transparent 0 50%, rgba(216, 206, 194, 0.42) 50.1%, transparent 50.45%),
        linear-gradient(28deg, transparent 0 74%, rgba(230, 209, 195, 0.5) 74.1%, transparent 74.45%),
        var(--cream);
      padding: 96px;
    }

    .canvas::before {
      content: "";
      position: absolute;
      inset: auto 0 0 auto;
      width: 360px;
      height: 360px;
      background: linear-gradient(135deg, transparent 49.7%, rgba(185, 143, 118, 0.34) 50%, transparent 50.3%);
      opacity: 0.9;
      pointer-events: none;
    }

    .content {
      position: relative;
      z-index: 1;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      border-left: 1px solid var(--border);
      padding-left: 58px;
    }

    .community {
      max-width: 720px;
      margin: 0;
      color: var(--sage);
      font-family: "Playfair Display", Georgia, serif;
      font-size: 82px;
      line-height: 1.04;
      letter-spacing: 0;
    }

    .body-copy {
      max-width: 690px;
      margin-top: 64px;
      color: var(--ink);
      font-size: 38px;
      line-height: 1.32;
    }

    .body-copy p {
      margin: 0 0 22px;
    }

    .footer {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 34px;
      color: var(--muted-sage);
      font-weight: 700;
    }

    .book {
      max-width: 430px;
      color: var(--sage);
      font-family: "Playfair Display", Georgia, serif;
      font-size: 34px;
      line-height: 1.12;
    }

    .author {
      margin-top: 14px;
      color: var(--muted-sage);
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .url {
      color: var(--ink);
      font-size: 24px;
      letter-spacing: 0.04em;
      white-space: nowrap;
    }

    [contenteditable="true"]:focus {
      outline: 3px solid rgba(185, 143, 118, 0.42);
      outline-offset: 6px;
    }
  </style>
</head>
<body>
  <main class="canvas" aria-label="Instagram feed community post">
    <section class="content">
      <div>
        <h1 class="community" contenteditable="true">For the ones who survived quietly.</h1>
        <div class="body-copy">
          <p contenteditable="true">Healing is not becoming untouched.</p>
          <p contenteditable="true">Sometimes it is folding back to yourself and re-defining your shape.</p>
        </div>
      </div>
      <div class="footer">
        <div>
          <div class="book" contenteditable="true">Unfolding Origami: A Memoir</div>
          <div class="author" contenteditable="true">Loren Galese</div>
        </div>
        <div class="url" contenteditable="true">wovenself.com/author</div>
      </div>
    </section>
  </main>
</body>
</html>
