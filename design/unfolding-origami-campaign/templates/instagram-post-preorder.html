<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Unfolding Origami Instagram Preorder Post</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --cream: #FBF7F0;
      --warm-white: #FFFDF9;
      --sage: #4A5C5A;
      --muted-sage: #7D8C88;
      --clay: #B98F76;
      --soft-clay: #E6D1C3;
      --ink: #2F3A38;
      --mist: #EDE8E1;
      --border: #D8CEC2;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--mist);
      color: var(--ink);
      font-family: "Inter", Arial, sans-serif;
    }

    .canvas {
      position: relative;
      width: 1080px;
      height: 1080px;
      overflow: hidden;
      background:
        linear-gradient(126deg, transparent 0 52%, rgba(216, 206, 194, 0.42) 52.1%, transparent 52.6%),
        linear-gradient(36deg, transparent 0 38%, rgba(230, 209, 195, 0.42) 38.1%, transparent 38.6%),
        var(--cream);
      padding: 88px;
    }

    .canvas::before,
    .canvas::after {
      content: "";
      position: absolute;
      pointer-events: none;
    }

    .canvas::before {
      inset: 42px;
      border: 1px solid rgba(216, 206, 194, 0.74);
    }

    .canvas::after {
      top: 0;
      right: 0;
      width: 210px;
      height: 210px;
      background: linear-gradient(135deg, var(--soft-clay) 0 50%, rgba(255, 253, 249, 0.85) 50.4% 100%);
      border-left: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }

    .paper {
      position: relative;
      z-index: 1;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      background: rgba(255, 253, 249, 0.78);
      border: 1px solid var(--border);
      padding: 74px;
    }

    .label {
      width: fit-content;
      margin-bottom: 78px;
      color: var(--clay);
      font-size: 31px;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    h1 {
      max-width: 720px;
      margin: 0 0 32px;
      color: var(--sage);
      font-family: "Playfair Display", Georgia, serif;
      font-size: 86px;
      line-height: 0.96;
      letter-spacing: 0;
    }

    .description {
      max-width: 720px;
      color: var(--ink);
      font-size: 33px;
      line-height: 1.32;
    }

    .details {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-top: 64px;
    }

    .detail {
      min-height: 88px;
      display: grid;
      place-items: center;
      padding: 16px 12px;
      border: 1px solid var(--border);
      background: var(--cream);
      color: var(--sage);
      font-size: 24px;
      font-weight: 700;
      text-align: center;
    }

    .url {
      align-self: flex-start;
      color: var(--sage);
      font-size: 27px;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    [contenteditable="true"]:focus {
      outline: 3px solid rgba(185, 143, 118, 0.42);
      outline-offset: 6px;
    }
  </style>
</head>
<body>
  <main class="canvas" aria-label="Instagram feed preorder post">
    <section class="paper">
      <div>
        <div class="label" contenteditable="true">PREORDERS OPEN</div>
        <h1 contenteditable="true">Unfolding Origami: A Memoir</h1>
        <p class="description" contenteditable="true">A trauma therapist's memoir about surviving trauma, re-defining your shape, and folding back to yourself.</p>
        <div class="details" aria-label="Preorder details">
          <div class="detail" contenteditable="true">Signed copy</div>
          <div class="detail" contenteditable="true">Surprise from Loren</div>
          <div class="detail" contenteditable="true">$24.99</div>
          <div class="detail" contenteditable="true">July 20</div>
        </div>
      </div>
      <div class="url" contenteditable="true">wovenself.com/author</div>
    </section>
  </main>
</body>
</html>
