<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Unfolding Origami Instagram Quote Post</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --cream: #FBF7F0;
      --warm-white: #FFFDF9;
      --sage: #4A5C5A;
      --muted-sage: #7D8C88;
      --clay: #B98F76;
      --soft-clay: #E6D1C3;
      --ink: #2F3A38;
      --mist: #EDE8E1;
      --border: #D8CEC2;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--mist);
      color: var(--ink);
      font-family: "Inter", Arial, sans-serif;
    }

    .canvas {
      position: relative;
      width: 1080px;
      height: 1080px;
      overflow: hidden;
      background:
        linear-gradient(142deg, transparent 0 45%, rgba(216, 206, 194, 0.56) 45.1%, transparent 45.35%),
        linear-gradient(68deg, transparent 0 62%, rgba(230, 209, 195, 0.45) 62.1%, transparent 62.4%),
        linear-gradient(22deg, transparent 0 26%, rgba(216, 206, 194, 0.38) 26.1%, transparent 26.35%),
        var(--warm-white);
      padding: 96px;
    }

    .canvas::before {
      content: "";
      position: absolute;
      inset: 44px;
      border: 1px solid rgba(216, 206, 194, 0.74);
      pointer-events: none;
    }

    .quote-wrap {
      position: relative;
      z-index: 1;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .mark {
      width: 84px;
      height: 84px;
      margin-bottom: 68px;
      border-top: 1px solid var(--clay);
      border-left: 1px solid var(--clay);
    }

    .quote {
      max-width: 800px;
      margin: 0;
      color: var(--sage);
      font-family: "Playfair Display", Georgia, serif;
      font-size: 86px;
      font-weight: 700;
      line-height: 1.06;
      letter-spacing: 0;
    }

    .meta {
      margin-top: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 36px;
      border-top: 1px solid var(--border);
      padding-top: 34px;
    }

    .book {
      color: var(--ink);
      font-size: 28px;
      font-weight: 700;
    }

    .author {
      margin-top: 8px;
      color: var(--muted-sage);
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .cta {
      min-width: 210px;
      padding: 18px 26px;
      border: 1px solid var(--sage);
      color: var(--sage);
      font-size: 22px;
      font-weight: 700;
      text-align: center;
    }

    .url {
      display: block;
      margin-top: 8px;
      color: var(--muted-sage);
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    [contenteditable="true"]:focus {
      outline: 3px solid rgba(185, 143, 118, 0.42);
      outline-offset: 6px;
    }
  </style>
</head>
<body>
  <main class="canvas" aria-label="Instagram feed quote post">
    <section class="quote-wrap">
      <div class="mark" aria-hidden="true"></div>
      <p class="quote" contenteditable="true">Some wounds don't bleed - they fold you inward.</p>
      <div class="meta">
        <div>
          <div class="book" contenteditable="true">Unfolding Origami: A Memoir</div>
          <div class="author" contenteditable="true">Loren Galese</div>
        </div>
        <div class="cta" contenteditable="true">Preorder Now<span class="url">wovenself.com/author</span></div>
      </div>
    </section>
  </main>
</body>
</html>
