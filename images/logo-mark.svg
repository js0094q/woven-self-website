<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 100 100"
     role="img"
     aria-label="The Woven Self Logo">

  <defs>
    <style>
      .stroke {
        fill: none;
        stroke: #2f4543;
        stroke-width: 2.2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .dots {
        fill: none;
        stroke: #2f4543;
        stroke-width: 2.2;
        stroke-linecap: round;
        stroke-dasharray: 0.1 7;
      }
    </style>
  </defs>

  <!-- Outer circle -->
  <circle class="stroke" cx="50" cy="50" r="43"/>

  <!-- Needle -->
  <path class="stroke" d="M60 30 L84 12"/>
  <path class="stroke" d="M82 14 L86 18"/>
  <path class="stroke" d="M82 14 Q85 10 88 14"/>

  <!-- Dotted thread -->
  <path class="dots"
        d="M26 28
           C35 22, 50 20, 63 26"/>

  <!-- Heart / woven structure -->
  <path class="stroke"
        d="M30 48
           C30 38, 44 36, 50 46
           C56 36, 70 38, 70 48"/>

  <path class="stroke"
        d="M34 52
           C30 56, 30 66, 38 72
           C44 76, 48 78, 50 84"/>

  <path class="stroke"
        d="M66 52
           C70 56, 70 66, 62 72
           C56 76, 52 78, 50 84"/>

  <!-- Inner weave lines -->
  <path class="stroke"
        d="M38 60
           C44 56, 46 54, 50 50
           C54 54, 56 56, 62 60"/>

  <path class="stroke"
        d="M38 66
           C44 62, 46 60, 50 56
           C54 60, 56 62, 62 66"/>

</svg>
