  <script>
    function getSlug() {
      const url = new URL(window.location.href);
      return url.searchParams.get('slug') || '';
    }

    const SAFE_PROTOCOLS = ['http:', 'https:', 'mailto:', 'tel:'];

    marked.setOptions({ mangle: false, headerIds: true, breaks: true });
    // Disallow raw HTML blocks in markdown; enforce safe links/images.
    marked.use({
      renderer: {
        html() { return ''; }
      },
      walkTokens(token) {
        if (token.type === 'link' || token.type === 'image') {
          const url = (() => { try { return new URL(token.href, window.location.origin); } catch { return null; } })();
          if (!url || !SAFE_PROTOCOLS.includes(url.protocol)) {
            token.href = '';
          }
        }
      }
    });

    async function loadPost() {
      const slug = getSlug();
      if (!slug) throw new Error('Missing slug');

      // ✅ RELATIVE fetch: from /blog/post.html -> posts.json is /blog/posts.json
      const postsRes = await fetch('posts.json', { cache: 'no-store' });
      if (!postsRes.ok) throw new Error('posts.json not found');
      const posts = await postsRes.json();
      const meta = posts.find(p => p.slug === slug);

      // ✅ RELATIVE fetch: from /blog/post.html -> /blog/posts/<slug>.md
      const mdRes = await fetch(`posts/${encodeURIComponent(slug)}.md`, { cache: 'no-store' });
      if (!mdRes.ok) throw new Error('Post not found');
      const md = await mdRes.text();

      const title = meta?.title || slug.replace(/-/g, ' ');
      const date = meta?.date || '';
      const excerpt = meta?.excerpt || '';

      document.title = `${title} | The Woven Self (NJ)`;

      const descTag = document.querySelector('meta[name="description"]');
      if (descTag && excerpt) descTag.setAttribute('content', excerpt);
      const ogTitle = document.querySelector('meta[property="og:title"]');
      const ogDesc = document.querySelector('meta[property="og:description"]');
      const twTitle = document.querySelector('meta[name="twitter:title"]');
      const twDesc = document.querySelector('meta[name="twitter:description"]');
      const ogUrl = document.querySelector('meta[property="og:url"]');
      if (ogTitle) ogTitle.setAttribute('content', `${title} | The Woven Self (NJ)`);
      if (twTitle) twTitle.setAttribute('content', `${title} | The Woven Self (NJ)`);
      if (excerpt && ogDesc) ogDesc.setAttribute('content', excerpt);
      if (excerpt && twDesc) twDesc.setAttribute('content', excerpt);
      if (ogUrl) ogUrl.setAttribute('content', window.location.href);

      const metaContainer = document.getElementById('post-meta');
      metaContainer.textContent = '';
      const h1 = document.createElement('h1');
      h1.className = 'text-4xl sm:text-5xl font-serif font-bold';
      h1.textContent = title;
      metaContainer.appendChild(h1);
      if (date) {
        const dateEl = document.createElement('div');
        dateEl.className = 'mt-3 text-sm opacity-80';
        dateEl.textContent = date;
        metaContainer.appendChild(dateEl);
      }

      const html = marked.parse(md);
      const article = document.getElementById('post-content');
      article.innerHTML = html;

      // Canonical: reflect the actual URL used for this system
      const canonical = document.querySelector('link[rel="canonical"]');
      if (canonical) canonical.setAttribute('href', window.location.href);

      const postSchema = document.getElementById('post-schema');
      if (postSchema) {
        const schema = {
          "@context": "https://schema.org",
          "@type": "BlogPosting",
          "headline": title,
          "description": excerpt || "Therapy-informed writing by Loren Galese, LPC in New Jersey.",
          "author": {
            "@type": "Person",
            "name": "Loren Galese"
          },
          "publisher": {
            "@type": "ProfessionalService",
            "name": "The Woven Self Therapeutic Services, LLC",
            "url": "https://wovenself.com/"
          },
          "datePublished": date || undefined,
          "dateModified": date || undefined,
          "mainEntityOfPage": window.location.href,
          "url": window.location.href,
          "image": "https://wovenself.com/images/logo.png",
          "inLanguage": "en-US"
        };
        postSchema.textContent = JSON.stringify(schema);
      }
    }

    loadPost().catch(() => {
      document.getElementById('post-meta').innerHTML =
        '<h1 class="text-3xl font-serif font-bold">Post not found</h1>';
      document.getElementById('post-content').innerHTML =
        '<p>Return to the <a href="../blog.html" class="underline underline-offset-4">blog</a>.</p>';
    });
  </script>
