<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Newsletter Part 2 Image Preview</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #ece7df;
      color: #24313A;
      font-family: Inter, Arial, sans-serif;
    }
    main {
      width: min(700px, 100%);
      margin: 0 auto;
      background: #ffffff;
      box-shadow: 0 20px 70px rgba(16, 34, 49, 0.16);
    }
    figure {
      margin: 0;
      padding: 0;
      background: #F6EFE8;
    }
    img {
      display: block;
      width: 100%;
      height: auto;
    }
    figcaption {
      padding: 8px 14px;
      background: rgba(16, 34, 49, 0.06);
      color: rgba(36, 49, 58, 0.72);
      font-size: 11px;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <main aria-label="Newsletter Part 2 image block preview">
      <figure>
        <img src="./01-header-logo.png" alt="The Woven Self logo">
        <figcaption>01-header-logo.png</figcaption>
      </figure>
      <figure>
        <img src="./02a-hero-cover-announcement.png" alt="The official cover announcement for Unfolding Origami: A Memoir by Loren Galese">
        <figcaption>02a-hero-cover-announcement.png</figcaption>
      </figure>
      <figure>
        <img src="./02b-hero-author-note.png" alt="A note from Loren Galese about Sarah Edmondson, Nippy, NXIVM, and Unfolding Origami">
        <figcaption>02b-hero-author-note.png</figcaption>
      </figure>
      <figure>
        <img src="./03a-preorder-signed-paperback.png" alt="Preorder signed paperback">
        <figcaption>03a-preorder-signed-paperback.png</figcaption>
      </figure>
      <figure>
        <img src="./03b-preorder-kindle-ebook.png" alt="Preorder Kindle ebook">
        <figcaption>03b-preorder-kindle-ebook.png</figcaption>
      </figure>
      <figure>
        <img src="./04-excerpt-feature.png" alt="A quiet first look at Loren Galese's upcoming memoir">
        <figcaption>04-excerpt-feature.png</figcaption>
      </figure>
      <figure>
        <img src="./05a-reminder-signed-paperback.png" alt="Preorder signed paperback">
        <figcaption>05a-reminder-signed-paperback.png</figcaption>
      </figure>
      <figure>
        <img src="./05b-reminder-kindle-ebook.png" alt="Preorder Kindle ebook">
        <figcaption>05b-reminder-kindle-ebook.png</figcaption>
      </figure>
      <figure>
        <img src="./06-closing-note.png" alt="A closing note from Loren Galese">
        <figcaption>06-closing-note.png</figcaption>
      </figure>
      <figure>
        <img src="./07-footer.png" alt="The Woven Self Therapeutic Services footer">
        <figcaption>07-footer.png</figcaption>
      </figure>
  </main>
</body>
</html>
